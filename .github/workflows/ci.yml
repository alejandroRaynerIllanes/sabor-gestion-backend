name: Integración Continua (CI) Backend

on:
  push:
    branches: [ "develop", "main" ]
  pull_request:
    branches:[ "develop", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
    - name: Obtener el código
      uses: actions/checkout@v3

    - name: Instalar Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Instalar dependencias
      run: npm install

    - name: Verificar compilación TypeScript
      run: npx tsc --noEmit